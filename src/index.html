<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помодоро Таймер</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="transition-bg bg-gradient-to-br from-red-500 to-red-700 min-h-screen flex items-center justify-center font-sans">
    <div class="bg-white bg-opacity-95 rounded-3xl p-10 shadow-2xl text-center max-w-lg w-11/12">
        <h1 class="text-gray-800 mb-8 text-4xl font-bold">🍅 Помодоро Таймер</h1>

        <div class="flex justify-center gap-3 mb-8 flex-wrap">
            <button class="mode-btn bg-gray-800 text-white px-5 py-2.5 rounded-xl cursor-pointer text-base transition-all duration-300 font-medium hover:-translate-y-0.5 hover:shadow-lg" data-mode="pomodoro">Работа</button>
            <button class="mode-btn bg-gray-200 text-gray-800 px-5 py-2.5 rounded-xl cursor-pointer text-base transition-all duration-300 font-medium hover:-translate-y-0.5 hover:shadow-lg" data-mode="short-break">Короткий перерыв</button>
            <button class="mode-btn bg-gray-200 text-gray-800 px-5 py-2.5 rounded-xl cursor-pointer text-base transition-all duration-300 font-medium hover:-translate-y-0.5 hover:shadow-lg" data-mode="long-break">Длинный перерыв</button>
        </div>

        <div id="timer" class="text-8xl font-bold text-gray-800 my-8 font-mono">25:00</div>

        <div class="w-full h-5 bg-gray-200 rounded-xl overflow-hidden mb-8">
            <div id="progress" class="h-full bg-gray-800 transition-all duration-500 rounded-xl" style="width: 100%;"></div>
        </div>

        <div class="flex justify-center gap-4 mb-5">
            <button id="startBtn" class="bg-gray-800 text-white px-10 py-4 rounded-xl cursor-pointer text-lg transition-all duration-300 font-semibold hover:scale-105 hover:shadow-xl active:scale-95">Старт</button>
            <button id="resetBtn" class="bg-gray-800 text-white px-10 py-4 rounded-xl cursor-pointer text-lg transition-all duration-300 font-semibold hover:scale-105 hover:shadow-xl active:scale-95">Сброс</button>
        </div>

        <div class="text-gray-600 text-lg mt-5">
            Завершено помодоро: <strong id="pomodoroCount" class="text-gray-800">0</strong>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
